services:
  - type: web
    name: shh7197-app
    runtime: node
    buildCommand: npm install && npx vite build && npx esbuild server/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shh7197-db
          property: connectionString

databases:
  - name: shh7197-db
